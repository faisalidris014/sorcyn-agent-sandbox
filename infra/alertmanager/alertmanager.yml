# Sorcyn AlertManager — Phase 4 D-06 Slack-only paging
# Slack incoming webhook URL provided via env var SLACK_WEBHOOK_URL at runtime.
# Pairs with infra/alertmanager/sorcyn-prod-rules.yml (5 prod alerts).
#
# Verification: AlertManager Slack delivery is NOT verified by 04-03; the
# end-to-end paging path is exercised by the chaos drill in 04-06 (W-6).
route:
  receiver: 'sorcyn-prod-alerts'
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
receivers:
  - name: 'sorcyn-prod-alerts'
    slack_configs:
      - api_url: ${SLACK_WEBHOOK_URL}
        channel: '#sorcyn-prod-alerts'
        send_resolved: true
        title: '{{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
