# Reverse Marketplace — Production Nginx Configuration
# SSL termination, WebSocket proxying, security headers

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time req_id=$upstream_http_x_request_id';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # Security
    server_tokens off;

    # Gzip (disabled — Fastify handles compression via @fastify/compress)
    gzip off;

    # Rate limiting zone (first line of defense before app-level rate limiting)
    limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    # Phase 4 D-01: weighted upstream pool for canary deploys.
    # Upstream weights are rendered from /opt/sorcyn-lb/canary-state.json into
    # /etc/nginx/conf.d/canary-upstream.conf by render-canary.sh; we include it here.
    # ip_hash is REQUIRED for Socket.IO long-polling sticky sessions (RESEARCH Pitfall 7).
    include /etc/nginx/conf.d/canary-upstream.conf;

    # HTTP -> HTTPS redirect
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL certificates (mount via Docker volume or use certbot)
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # SSL hardening
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout 5s;

        # Max upload size (matches Fastify multipart: 10MB images, 25MB docs)
        client_max_body_size 25m;

        # Security headers (supplementing Fastify's helmet)
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Socket.IO WebSocket support
        location /socket.io/ {
            proxy_pass http://api_pool;
            proxy_http_version 1.1;

            # WebSocket upgrade
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket timeouts (keep alive for long-polling fallback)
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;

            # No buffering for real-time
            proxy_buffering off;
        }

        # Auth endpoints — stricter rate limit
        location ~ ^/api/v1/auth/(register|login|forgot-password) {
            limit_req zone=auth burst=10 nodelay;

            proxy_pass http://api_pool;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # Stripe webhook — no rate limit, raw body pass-through
        location = /api/v1/payments/webhook {
            proxy_pass http://api_pool;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # Health check (no rate limit, used by monitoring)
        location = /health {
            proxy_pass http://api_pool;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
        }

        # Metrics endpoint (restrict to internal/monitoring)
        location = /metrics {
            proxy_pass http://api_pool;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
        }

        # All other API routes
        location / {
            limit_req zone=api burst=100 nodelay;

            proxy_pass http://api_pool;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }
    }
}
