name: Issue Map

# Regenerates docs/ISSUE_MAP_V1.1.md from live GitHub issues so neither operator has to
# run scripts/gen-issue-map.mjs by hand. The map is generated, never hand-edited — the
# curated input is scripts/issue-map/clusters.json.
#
# main is protected (ruleset "Approval Requirement Before Merge" requires a PR + approval,
# no bypass actors), so this job does NOT push to main. It opens/updates a PR with the
# refreshed doc; Faisal merges it like any other PR.
#
# Triggers: when issues change (so the map refreshes promptly), a daily safety-net cron,
# and manual dispatch.

on:
  issues:
    types: [opened, closed, reopened, labeled, unlabeled, edited, deleted]
  schedule:
    - cron: '0 6 * * *'  # daily 06:00 UTC safety net
  workflow_dispatch:

# Serialize refreshes so concurrent triggers (e.g. an issue's opened+labeled events
# both firing) queue instead of overlapping and racing on the shared refresh branch.
concurrency:
  group: issue-map
  cancel-in-progress: false

permissions:
  contents: write        # push the doc-update branch
  issues: read           # gh issue list
  pull-requests: write   # open/update the PR

jobs:
  regenerate:
    name: Regenerate issue map → PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate issue map
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # gh CLI auth
        run: node scripts/gen-issue-map.mjs

      - name: Open / update PR if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet -- docs/ISSUE_MAP_V1.1.md; then
            echo "No change — issue map already up to date."
            exit 0
          fi
          BRANCH="chore/issue-map-refresh"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add docs/ISSUE_MAP_V1.1.md
          git commit -m "docs: refresh V1.1 issue map"
          # Plain --force (not --force-with-lease): each run recreates this disposable,
          # bot-owned branch from a fresh checkout, so it has no local knowledge of the
          # branch's current remote SHA and a lease check would always reject.
          git push --force origin "$BRANCH"
          # Create the PR only if one isn't already open for this branch.
          if [ -z "$(gh pr list --head "$BRANCH" --state open --json number --jq '.[].number')" ]; then
            gh pr create --base main --head "$BRANCH" \
              --title "docs: refresh V1.1 issue map" \
              --body "Automated refresh of \`docs/ISSUE_MAP_V1.1.md\` from live GitHub issues (generated by \`scripts/gen-issue-map.mjs\`). Curated input: \`scripts/issue-map/clusters.json\`. Safe to merge."
          else
            echo "PR already open for $BRANCH — updated its branch."
          fi
