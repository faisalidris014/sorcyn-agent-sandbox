services:
  postgres:
    image: postgres:15-alpine
    container_name: rm-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reverse_marketplace
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Local S3-compatible object storage for file uploads (Cloudflare R2 stand-in).
  # storage.ts falls back to http://localhost:9000 with minioadmin creds when
  # R2_ACCOUNT_ID is unset, so dev uploads work with zero shared secrets.
  # Console UI: http://localhost:9001 (minioadmin / minioadmin).
  minio:
    image: minio/minio:latest
    container_name: rm-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot: create the bucket and make it anonymously readable so the app can
  # load uploaded images via the public URL (R2_PUBLIC_URL). Exits when done.
  minio-setup:
    image: minio/mc:latest
    container_name: rm-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >-
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/reverse-marketplace &&
      mc anonymous set download local/reverse-marketplace &&
      echo 'MinIO bucket reverse-marketplace ready (public read)';
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:
